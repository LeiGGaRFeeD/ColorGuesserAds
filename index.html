  </div>

  <script>
    // ===== SERVICE WORKER =====
    window.addEventListener("load", function () {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("ServiceWorker.js");
      }
    });

    // ===== UNITY ELEMENTS =====
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var warningBanner = document.querySelector("#unity-warning");

    // ===== BANNER =====
    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);

      if (type == 'error') {
        div.style = 'background: red; padding: 10px;';
      } else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function() {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    // ===== UNITY CONFIG =====
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/10VerticalFHD_R4.loader.js";

    var config = {
      arguments: [],
      dataUrl: buildUrl + "/10VerticalFHD_R4.data",
      frameworkUrl: buildUrl + "/10VerticalFHD_R4.framework.js",
      codeUrl: buildUrl + "/10VerticalFHD_R4.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Side Apps",
      productName: "PlayableStudyCaseQuiz",
      productVersion: "1.0_vertical",
      showBanner: unityShowBanner,

      // отключаем авто-растягивание Unity
      matchWebGLToCanvasSize: false
    };

    // ===== MOBILE VIEWPORT =====
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content =
        'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.head.appendChild(meta);
    }

    // ===== НАСТРОЙКИ =====
    const MIN_WIDTH = 720;
    const MIN_HEIGHT = 1280;
    const MAX_DPR = 2; // ограничение для производительности

    // ===== ПОРТРЕТ + DPR =====
    function applyPortraitLayout() {
      document.body.style.display = "flex";
      document.body.style.justifyContent = "center";
      document.body.style.alignItems = "center";

      const vw = window.innerWidth;
      const vh = window.innerHeight;

      let width = vh * (9 / 16);
      let height = vh;

      if (width > vw) {
        width = vw;
        height = vw * (16 / 9);
      }

      // минимум
      if (width < MIN_WIDTH) {
        width = MIN_WIDTH;
        height = MIN_HEIGHT;
      }

      container.style.width = width + "px";
      container.style.height = height + "px";
      container.style.position = "relative";

      // 👉 DPR фикс (убирает пикселизацию)
      const dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);

      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);

      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      canvas.style.display = "block";
    }

    window.addEventListener("resize", applyPortraitLayout);
    applyPortraitLayout();

    // (опционально) блокировка ориентации
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock("portrait").catch(() => {});
    }

    // ===== LOADING =====
    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      })
      .then((unityInstance) => {
        loadingBar.style.display = "none";
      })
      .catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>

</body>
